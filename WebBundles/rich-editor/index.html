<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Editor</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- ── Formatting toolbar ────────────────────────────────────────────────── -->
<div id="toolbar">

  <!-- Block type -->
  <div class="tb-group">
    <select id="tb-block-type" title="Text style">
      <option value="p">Paragraph</option>
      <option value="h1">Heading 1</option>
      <option value="h2">Heading 2</option>
      <option value="h3">Heading 3</option>
    </select>
  </div>

  <div class="tb-sep"></div>

  <!-- Marks -->
  <div class="tb-group">
    <button class="tb-btn" id="tb-bold" data-cmd="bold" title="Bold ⌘B">
      <span class="tb-char tb-char--bold">B</span>
    </button>
    <button class="tb-btn" id="tb-italic" data-cmd="italic" title="Italic ⌘I">
      <span class="tb-char tb-char--italic">I</span>
    </button>
    <button class="tb-btn" id="tb-strike" data-cmd="strike" title="Strikethrough">
      <span class="tb-char tb-char--strike">S</span>
    </button>
    <button class="tb-btn" id="tb-code" data-cmd="code" title="Inline code">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5,4 1,8 5,12"/>
        <polyline points="11,4 15,8 11,12"/>
      </svg>
    </button>
  </div>

  <div class="tb-sep"></div>

  <!-- Block formats -->
  <div class="tb-group">
    <button class="tb-btn" id="tb-blockquote" data-cmd="blockquote" title="Blockquote">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <line x1="3.5" y1="3.5" x2="3.5" y2="12.5"/>
        <line x1="6"   y1="5.5" x2="13"  y2="5.5"/>
        <line x1="6"   y1="8"   x2="13"  y2="8"/>
        <line x1="6"   y1="10.5" x2="11" y2="10.5"/>
      </svg>
    </button>
    <button class="tb-btn" id="tb-code-block" data-cmd="code-block" title="Code block">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5,4 1,8 5,12"/>
        <polyline points="11,4 15,8 11,12"/>
        <line x1="9.5" y1="3" x2="6.5" y2="13"/>
      </svg>
    </button>
  </div>

  <div class="tb-sep"></div>

  <!-- Lists -->
  <div class="tb-group">
    <button class="tb-btn" id="tb-bullet-list" data-cmd="bullet-list" title="Bullet list">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <circle cx="2.5" cy="4.5"  r="1.25"/>
        <circle cx="2.5" cy="8"    r="1.25"/>
        <circle cx="2.5" cy="11.5" r="1.25"/>
        <rect x="5.5" y="3.75"  width="8.5" height="1.5" rx=".75"/>
        <rect x="5.5" y="7.25"  width="8.5" height="1.5" rx=".75"/>
        <rect x="5.5" y="10.75" width="8.5" height="1.5" rx=".75"/>
      </svg>
    </button>
    <button class="tb-btn" id="tb-ordered-list" data-cmd="ordered-list" title="Numbered list">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="6.5" y1="4.5"  x2="14" y2="4.5"/>
        <line x1="6.5" y1="8"    x2="14" y2="8"/>
        <line x1="6.5" y1="11.5" x2="14" y2="11.5"/>
        <!-- 1 -->
        <line x1="3.5" y1="2.5" x2="3.5" y2="6.5" stroke-width="1.5"/>
        <path d="M2.5 3.5 3.5 2.5" stroke-width="1.5"/>
        <!-- 2 -->
        <path d="M2.5 7.5 q0-1.5 2-1 0 .8-2 2h2" stroke-width="1.4"/>
        <!-- 3 -->
        <path d="M2.5 10.5 q1.5-1 1.5 0t-1.5.5M2.5 13 q1.5 1 1.5 0t-1.5-.5" stroke-width="1.4"/>
      </svg>
    </button>
    <button class="tb-btn" id="tb-task-list" data-cmd="task-list" title="Task list">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2.5" width="5" height="5" rx="1"/>
        <polyline points="3.2,5 4.5,6.3 6.5,4"/>
        <rect x="2" y="9.5" width="5" height="5" rx="1"/>
        <line x1="9" y1="5"    x2="14" y2="5"/>
        <line x1="9" y1="12"   x2="14" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="tb-sep"></div>

  <!-- Insert -->
  <div class="tb-group">
    <button class="tb-btn" id="tb-link" data-cmd="link" title="Link">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <path d="M9 7l1-1a2.83 2.83 0 0 0-4-4L4.5 3.5a2.83 2.83 0 0 0 0 4L6 9"/>
        <path d="M7 9l-1 1a2.83 2.83 0 0 0 4 4l1.5-1.5a2.83 2.83 0 0 0 0-4L10 7"/>
        <line x1="9.5" y1="6.5" x2="6.5" y2="9.5"/>
      </svg>
    </button>
    <button class="tb-btn" id="tb-table" data-cmd="table" title="Insert 3×3 table">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="2" y="2" width="12" height="12" rx="1.5"/>
        <line x1="2"  y1="6"  x2="14" y2="6"/>
        <line x1="7"  y1="6"  x2="7"  y2="14"/>
        <line x1="11" y1="6"  x2="11" y2="14"/>
      </svg>
    </button>
    <button class="tb-btn" id="tb-hr" data-cmd="hr" title="Divider">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
    </button>
  </div>

</div>

<!-- ── Editor ─────────────────────────────────────────────────────────────── -->
<div id="editor-wrapper">
  <div id="editor"></div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
